        header {

        .search-box:focus-within {
            border-color: #ff1e27; 
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
        }

        .search-input {

            font-size: 1rem;

        }

        .search-box i { color: #555866; margin-right: 12px; }

        .main-container { padding: 0 8% 80px 8%; }

    <!-- --- JAVASCRIPT LOGIC --- -->
    <script>
        function openMovieModal(cardElement) {
            document.getElementById('modalTitle').innerText = cardElement.getAttribute('data-title');
            document.getElementById('modalDesc').innerText = cardElement.getAttribute('data-desc');
            document.getElementById('modalImg').src = cardElement.getAttribute('data-img'); 
            
            let container = document.getElementById('episodesContainer');
            container.innerHTML = ""; // Clear old boxes

            // Check up to 20 episodes
            for(let i = 1; i <= 20; i++) {
                let link480 = cardElement.getAttribute(`data-ep${i}-480p`);
                let link720 = cardElement.getAttribute(`data-ep${i}-720p`);
                let link1080 = cardElement.getAttribute(`data-ep${i}-1080p`);

                // Agar kisi bhi quality ka link iss episode me available hai, tabhi box banega
                if ((link480 && link480.trim() !== "") || (link720 && link720.trim() !== "") || (link1080 && link1080.trim() !== "")) {
                    
                    // Create Episode Block Container
                    let block = document.createElement('div');
                    block.className = "episode-block";
                    
                    // Episode Title Label
                    let title = document.createElement('div');
                    title.className = "episode-title";
                    title.innerHTML = `<i class="fas fa-film"></i>EPISODE-${i}`;
                    block.appendChild(title);
                    
                    // Quality Buttons Grid
                    let grid = document.createElement('div');
                    grid.className = "quality-grid";

                    // 480p Button Setup
                    if(link480 && link480.trim() !== "") {
                        grid.innerHTML += `<a href="${link480}" download target="_blank" class="download-btn"><i class="fas fa-download"></i> 480p</a>`;
                    }
                    // 720p Button Setup
                    if(link720 && link720.trim() !== "") {
                        grid.innerHTML += `<a href="${link720}" download target="_blank" class="download-btn"><i class="fas fa-download"></i> 720p</a>`;
                    }
                    // 1080p Button Setup
                    if(link1080 && link1080.trim() !== "") {
                        grid.innerHTML += `<a href="${link1080}" download target="_blank" class="download-btn"><i class="fas fa-download"></i> 1080p</a>`;
                    }

                    block.appendChild(grid);
                    container.appendChild(block);
                }
            }

            document.getElementById('movieModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('movieModal').classList.remove('active');
        }

        function closeMovieModal(event) {
            if(event.target.classList.contains('modal-overlay')) {
                closeModal();
            }
        }

        function filterMovies() {
            let input = document.getElementById('movieSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('movie-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getAttribute('data-title').toLowerCase();
                cards[i].style.display = title.includes(input) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
