<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure UPI Unlock with QR</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; padding: 30px 10px; }
        .box { background: white; padding: 30px; border-radius: 10px; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        .btn { background: #2563eb; color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; text-decoration: none; display: block; margin-bottom: 15px; box-sizing: border-box;}
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .error { color: red; display: none; margin-top: 10px; font-weight: bold; }
        .success { color: green; display: none; margin-top: 10px; font-weight: bold; }
        
        /* QR Code Styling */
        .qr-container { margin: 20px 0; padding: 15px; border: 2px dashed #ccc; border-radius: 8px; background: #fafafa; }
        .qr-container img { width: 180px; height: 180px; margin-top: 10px; }
        .or-text { font-weight: bold; color: #888; margin: 15px 0; }
    </style>
</head>
<body>

<div class="box">
    <h2>Pay ₹10 to Unlock Link</h2>
    <p>Mobile users niche diye button par click karein:</p>
    
    <a href="upi://pay?pa=harshkalani18@fam&pn=YOUR_NAME&am=1.00&cu=INR" class="btn">Pay via UPI App</a>

    <div class="or-text">— YA FIR SCAN KAREIN —</div>

    <div class="qr-container">
        <strong>Scan QR Code to Pay ₹10</strong><br>
        <img id="upiQR" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=harshkalani18@fam%26pn=YOUR_NAME%26am=1.00%26cu=INR" alt="UPI QR Code">
    </div>

    <p style="margin-top: 20px;"><strong>Payment ke baad 12-digit UTR Number dalein:</strong></p>
    <input type="number" id="utrField" placeholder="Enter 12 Digit UTR Number">
    <button class="btn" style="background: #10b981;" onclick="checkPayment()">Verify & Open Link</button>

    <div id="errorMsg" class="error">Galat UTR! Pehle payment karein fir sahi UTR dalein.</div>
    <div id="successMsg" class="success">Verification Successful! Opening Link...</div>
</div>

<script>
    async function checkPayment() {
        const userUTR = document.getElementById("utrField").value;
        const error = document.getElementById("errorMsg");
        const success = document.getElementById("successMsg");

        if(userUTR.length !== 12) {
            error.style.display = "block";
            error.innerText = "UTR hamesha 12-digit ka hota hai!";
            return;
        }

        // FIREBASE DATABASE LINK: Yahan aapki Firebase database ki URL aayegi
        const firebaseURL = `https://YOUR_PROJECT_NAME.firebaseio.com/payments/${userUTR}.json`;

        try {
            let response = await fetch(firebaseURL);
            let data = await response.json();

            if (data && data.status === "SUCCESS") {
                error.style.display = "none";
                success.style.display = "block";
                
                // Real payment milte hi aapki secret link yahan khulegi
                setTimeout(() => {
                    window.location.href = "https://your-secret-link-here.com";
                }, 1500);
            } else {
                error.style.display = "block";
                error.innerText = "Yeh UTR humare bank me receive nahi hua. Kripya sahi UTR dalein!";
            }
        } catch (e) {
            error.style.display = "block";
            error.innerText = "Server Error! Baad me try karein.";
        }
    }
</script>

</body>
</html>
