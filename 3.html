<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DETFLIX - Ultimate Movies, Series, Drama & Anime Hub</title>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #06070a; color: #fff; overflow-x: hidden; display: flex; }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 240px; height: 100vh; background: #090a0f; position: fixed; left: 0; top: 0;
            padding: 25px 15px; border-right: 1px solid rgba(245, 197, 24, 0.1); z-index: 90;
        }
        .sidebar-logo { font-size: 26px; font-weight: 800; color: #f5c518; margin-bottom: 35px; padding-left: 10px; letter-spacing: 1px; }
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { 
            display: flex; align-items: center; gap: 15px; padding: 12px 15px; color: #94a3b8; 
            text-decoration: none; font-weight: 500; border-radius: 10px; cursor: pointer; transition: all 0.25s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(245, 197, 24, 0.1); color: #fff; }
        .nav-item.active i { color: #f5c518; }

        /* --- MAIN CONTENT AREA --- */
        .main-content { margin-left: 240px; width: calc(100% - 240px); min-height: 100vh; padding-bottom: 80px; }

        .top-header {
            display: flex; justify-content: space-between; align-items: center; padding: 15px 4%;
            background: rgba(6, 7, 10, 0.95); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.03); gap: 15px;
        }
        .search-wrapper {
            display: flex; align-items: center; background: #12131a; width: 100%; max-width: 450px;
            padding: 8px 18px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05);
        }
        .search-wrapper input { background: transparent; border: none; outline: none; color: #fff; width: 100%; margin-left: 10px; font-size: 0.9rem; }
        .search-wrapper i { color: #555866; }

        /* Premium Telegram Button Style */
        .tg-join-btn {
            display: flex; align-items: center; gap: 8px; background: #f5c518; color: #000;
            padding: 9px 18px; border-radius: 30px; font-weight: 600; text-decoration: none;
            font-size: 0.85rem; transition: all 0.25s ease; flex-shrink: 0; box-shadow: 0 4px 12px rgba(245, 197, 24, 0.2);
        }
        .tg-join-btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(255, 255, 255, 0.2); }
        .tg-join-btn i { font-size: 1.05rem; }

        /* --- MOVIE GRID --- */
        .grid-container { padding: 25px 4%; }
        .section-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; color: #f8fafc; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 20px; background: #f5c518; display: inline-block; border-radius: 2px; }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 18px; }
        .movie-card { background: #12131a; border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.02); }
        .movie-card:hover { transform: translateY(-5px); border-color: rgba(245, 197, 24, 0.3); }
        
        .card-img-box { position: relative; width: 100%; aspect-ratio: 2/3; background: #1c1e29; }
        .card-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.2s; }
        .movie-card:hover .card-overlay { opacity: 1; }
        .card-overlay i { font-size: 2.5rem; color: #f5c518; }

        .movie-info { padding: 10px; }
        .movie-title { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #f1f5f9; }
        .movie-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: #64748b; margin-top: 4px; }
        .rating-badge { color: #f5c518; font-weight: 600; }
        .audio-tag { background: rgba(245, 197, 24, 0.15); color: #f5c518; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }

        /* --- MODAL POPUP SYSTEM --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 4, 6, 0.95);
            backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 15px;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-card {
            background: #111217; width: 100%; max-width: 580px; border-radius: 16px;
            border: 1px solid rgba(245, 197, 24, 0.2); max-height: 90vh; 
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        /* --- VIDEO BOX WITH ABSOLUTE BACK BUTTON --- */
        .modal-video-box { 
            width: 100%; aspect-ratio: 16/9; background: #000; 
            overflow: hidden; display: none; flex-shrink: 0; z-index: 1005; position: relative;
        }
        .modal-video-box video, .modal-video-box iframe { width: 100%; height: 100%; border: none; object-fit: contain; }

        /* Premium Floating Video Back Button */
        .video-back-btn {
            position: absolute; top: 12px; left: 12px; font-size: 1.1rem; color: #000;
            background: #f5c518; width: 38px; height: 38px; border-radius: 50%;
            display: none; justify-content: center; align-items: center; cursor: pointer; 
            z-index: 1020; border: 1px solid rgba(255,255,255,0.15); transition: all 0.2s ease;
        }
        .video-back-btn:hover { background: #fff; transform: scale(1.05); }

        .modal-body-content { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 5px; color: #fff; padding-right: 20px; }
        .modal-desc { font-size: 0.85rem; color: #94a3b8; margin-bottom: 20px; line-height: 1.4; }

        .episode-container { display: none; flex-direction: column; gap: 10px; margin-top: 10px; }
        .section-sub-title { font-size: 0.9rem; font-weight: 600; color: #94a3b8; margin-bottom: 5px; margin-top: 10px; }
        
        .episode-btn {
            background: #181922; border: 1px solid rgba(255,255,255,0.05); color: #fff;
            padding: 12px 15px; text-align: left; border-radius: 8px; font-weight: 500;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s;
        }
        .episode-btn:hover { background: linear-gradient(135deg, #f5c518, #c69d0e); color: #000; border-color: transparent; }
        .episode-btn i { color: #f5c518; }
        .episode-btn:hover i { color: #000; }

        /* --- BOTTOM NAV (Mobile Only) --- */
        .bottom-nav {
            display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #090a0f;
            border-top: 1px solid rgba(255,255,255,0.05); justify-content: space-around; padding: 10px 0; z-index: 100;
        }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; text-decoration: none; font-size: 0.7rem; gap: 4px; }
        .bottom-nav-item.active { color: #f5c518; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; width: 100%; padding-bottom: 70px; }
            .bottom-nav { display: flex; }
            .movie-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }

            .modal-overlay { padding: 0; } 
            .modal-card { max-width: 100%; width: 100%; height: 100%; max-height: 100vh; border-radius: 0; border: none; }
            .modal-body-content { padding: 15px; }
            .video-back-btn { top: calc(12px + env(safe-area-inset-top, 5px)); left: 12px; width: 40px; height: 40px; font-size: 1.2rem; }
            
            /* Responsive adjustments for Telegram button on mobile */
            .tg-join-btn span { display: none; }
            .tg-join-btn { padding: 10px; border-radius: 50%; width: 40px; height: 40px; justify-content: center; }
            .tg-join-btn i { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

        <div class="sidebar-logo">DETFLIX</div>
        <ul class="nav-links">

    <!-- MAIN DASHBOARD -->
    <div class="main-content">

            <div class="search-wrapper">

                <input type="text" id="searchBar" placeholder="Search..." onkeyup="searchContent()">

            <!-- 📢 Premium Telegram Button Added Here -->
            <a href="https://t.me/DETFLIX_H" target="_blank" class="tg-join-btn">

            </a>
        </div>

        <div class="grid-container">
            <h2 class="section-title" id="sectionHeading">Movies</h2>
            <div class="movie-grid" id="contentGrid"></div>
        </div>
    </div>

    <!-- PLAY SYSTEM MODAL POPUP -->
    <div class="modal-overlay" id="playerModal" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            
            <div class="modal-video-box" id="videoBox">
                <!-- Premium Floating Back Arrow Button -->
                <div class="video-back-btn" id="videoBackBtn" onclick="closeModal()"><i class="fas fa-arrow-left"></i></div>
                
                <video id="mainVideoPlayer" controls playsinline></video>
                <iframe id="mainIframePlayer" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>
            </div>

            <div class="modal-body-content">
                <h2 class="modal-title" id="modalTitle">Title</h2>
                <p class="modal-desc" id="modalDesc">Description...</p>
                
                <div id="languageTitle" class="section-sub-title" style="display:none;"><i class="fas fa-language"></i> Select Audio Language</div>
                <div class="episode-container" id="languageBox"></div>
                
                <div id="episodeTitle" class="section-sub-title" style="display:none;"><i class="fas fa-list"></i> Select Episode</div>
                <div class="episode-container" id="episodeBox"></div>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <a href="#" class="bottom-nav-item active" onclick="changeCategory('movie')"><i class="fas fa-film"></i>Movies</a>
        <a href="#" class="bottom-nav-item" onclick="changeCategory('tv')"><i class="fas fa-tv"></i>Series</a>
        <a href="#" class="bottom-nav-item" onclick="changeCategory('drama')"><i class="fas fa-theater-masks"></i>Dramas</a>
        <a href="#" class="bottom-nav-item" onclick="changeCategory('anime')"><i class="fas fa-dragon"></i>Anime</a>

    <script>
        let currentType = 'movie';

        const myDatabase = [
            {

                year: "2026",
                rating: "",

            },
            {

                videoUrl: "https://web.nxsha.app/embed/movie/157336"
            },










            {
                type: "tv",
                title: "Money Heist (Season 1)",
                img: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=600",
                year: "2021",
                rating: "8.8",
                audio: "Hindi/Eng",

                episodes: [
                    { name: "Episode 1 - The Plan", url: "https://ok.ru/video/14776520280596" },
                    { name: "Episode 2 - Lethal Weapons", url: "https://odysee.com/Teach.You.a.Lesson.S01E01.1080p.WEB-DL.Hindi.5.1-English.5.1.ESub.x264-Detflix.Tv:b" }
                ]
            },
            {
                type: "tv",
                title: "All of Us Are Dead (Season 1)",
                img: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=600",
                year: "2026",
                rating: "",
                audio: "EP-10",
                desc: "A high school becomes ground zero for a zombie virus outbreak. Trapped students must fight their way out.",
                episodes: [
                    { name: "Episode 01 [Multi Audio]", url: "https://web.nxsha.app/embed/tv/1399/1/1" }
                ]
            },










            {
                type: "drama",
                title: "Teach You a Lesson",
                img: "https://ww19.myasiantv.es/wp-content/uploads/2026/05/gN7Tq35raryabkPGcKlb4ZKeutm.jpg",
                year: "2026",
                rating: "",
                audio: "EP-10",
                desc: "The National Assembly and the Minister of Education passes the Amendment to the Act on the Protection of Teachers' Rights. With the passage of the law, a new government organization, the Educational Rights Protection Bureau, is formed. Na Hwa-jin belongs to the Educational Rights Protection Bureau. He is sent to a problem school as a supervisor. There, he can educate the students without any restrictions or limitations.",
                episodes: [
                    { name: "Episode 1", url: "https://web.nxsha.app/embed/tv/276161/1/1" },
                    { name: "Episode 2", url: "https://web.nxsha.app/embed/tv/276161/1/2" },
                    { name: "Episode 3", url: "https://web.nxsha.app/embed/tv/276161/1/3" },
                    { name: "Episode 4", url: "https://web.nxsha.app/embed/tv/276161/1/4" },
                    { name: "Episode 5", url: "https://web.nxsha.app/embed/tv/276161/1/5" },
                    { name: "Episode 6", url: "https://web.nxsha.app/embed/tv/276161/1/6" },
                    { name: "Episode 7", url: "https://web.nxsha.app/embed/tv/276161/1/7" },
                    { name: "Episode 8", url: "https://web.nxsha.app/embed/tv/276161/1/8" },
                    { name: "Episode 9", url: "https://web.nxsha.app/embed/tv/276161/1/9" },
                    { name: "Episode 10", url: "https://web.nxsha.app/embed/tv/276161/1/10" }
                ]
            },










            {
                type: "anime",
                title: "Naruto Shippuden",
                img: "https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=600",
                year: "2017",
                rating: "9.1",
                audio: "Hindi/Eng",
                desc: "Naruto Uzumaki wants to become the greatest ninja.",
                episodes: [
                    { name: "Episode 1 - Homecoming", url: "https://ok.ru/video/14776520280596" }
                ]
            }
        ];

        function renderCards(dataList) {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = ""; 

            if(dataList.length === 0) {
                grid.innerHTML = "<p style='color: #64748b; padding-left: 5px;'>No content found.</p>";
                return;
            }

            dataList.forEach(item => {
                let card = document.createElement('div');
                card.className = "movie-card";
                card.innerHTML = `
                    <div class="card-img-box">
                        <img src="${item.img}" alt="Poster" loading="lazy">
                        <div class="card-overlay"><i class="fas fa-play-circle"></i></div>
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${item.title}</div>
                        <div class="movie-meta">
                            <span>${item.year}</span>
                            <span class="audio-tag">${item.audio || 'HINDI'}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(item);
                grid.appendChild(card);
            });
        }

        function playSmartVideo(url) {
            const videoBox = document.getElementById('videoBox');
            const player = document.getElementById('mainVideoPlayer');
            const iframePlayer = document.getElementById('mainIframePlayer');
            const videoBackBtn = document.getElementById('videoBackBtn');

            videoBox.style.display = "block";
            videoBackBtn.style.display = "flex"; 

            if (url.includes("ok.ru/video/")) {
                url = url.replace("ok.ru/video/", "ok.ru/videoembed/");
            }
            
            if (url.includes("odysee.com") && !url.includes("/$/embed/")) {
                let cleanUrl = url.split('?')[0]; 
                url = cleanUrl.replace("odysee.com/", "odysee.com/$/embed/");
            }

            if (url.includes("nxsha.app") || url.includes("drive.google") || url.includes("iframe") || url.includes("streamwish") || url.includes("streamtape") || url.includes("/e/") || url.includes("ok.ru") || url.includes("odysee.com")) {
                player.style.display = "none";
                player.pause(); player.src = "";
                
                iframePlayer.style.display = "block";
                iframePlayer.src = url;
                
                iframePlayer.setAttribute("allow", "autoplay; fullscreen; picture-in-picture; encrypted-media; clipboard-write");
                iframePlayer.setAttribute("allowfullscreen", "true");
            } else {
                iframePlayer.style.display = "none"; iframePlayer.src = "";
                player.style.display = "block";
                player.src = url;
                player.play();
            }
        }

        function openModal(item) {
            const modal = document.getElementById('playerModal');
            const videoBox = document.getElementById('videoBox');
            const episodeBox = document.getElementById('episodeBox');
            const languageBox = document.getElementById('languageBox');
            const episodeTitle = document.getElementById('episodeTitle');
            const languageTitle = document.getElementById('languageTitle');
            const player = document.getElementById('mainVideoPlayer');
            const iframePlayer = document.getElementById('mainIframePlayer');
            const videoBackBtn = document.getElementById('videoBackBtn');

            document.getElementById('modalTitle').innerText = item.title;
            document.getElementById('modalDesc').innerText = item.desc;

            player.src = ""; iframePlayer.src = "";
            videoBox.style.display = "none";
            videoBackBtn.style.display = "none"; 
            episodeBox.style.display = "none"; languageBox.style.display = "none";
            episodeTitle.style.display = "none"; languageTitle.style.display = "none";
            episodeBox.innerHTML = ""; languageBox.innerHTML = "";

            if (item.type === 'movie') {
                if (item.videoUrlHindi || item.videoUrlEnglish) {
                    languageBox.style.display = "flex";
                    languageTitle.style.display = "block";
                    
                    if (item.videoUrlHindi) {
                        let btnH = document.createElement('div');
                        btnH.className = "episode-btn";
                        btnH.innerHTML = `<span>🔊 Play in Hindi</span> <i class="fas fa-play-circle"></i>`;
                        btnH.onclick = () => playSmartVideo(item.videoUrlHindi);
                        languageBox.appendChild(btnH);
                    }
                    if (item.videoUrlEnglish) {
                        let btnE = document.createElement('div');
                        btnE.className = "episode-btn";
                        btnE.innerHTML = `<span>🌐 Play in English</span> <i class="fas fa-play-circle"></i>`;
                        btnE.onclick = () => playSmartVideo(item.videoUrlEnglish);
                        languageBox.appendChild(btnE);
                    }
                } else {
                    playSmartVideo(item.videoUrl);
                }
            } else {
                episodeBox.style.display = "flex";
                episodeTitle.style.display = "block";
                item.episodes.forEach(ep => {
                    let btn = document.createElement('div');
                    btn.className = "episode-btn";
                    btn.innerHTML = `<span>${ep.name}</span> <i class="fas fa-play-circle"></i>`;
                    btn.onclick = () => playSmartVideo(ep.url);
                    episodeBox.appendChild(btn);
                });
            }
            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('playerModal');
            document.getElementById('videoBackBtn').style.display = "none"; 
            document.getElementById('mainVideoPlayer').pause(); 
            document.getElementById('mainVideoPlayer').src = "";
            document.getElementById('mainIframePlayer').src = ""; 
            modal.classList.remove('active');
        }

        function changeCategory(type) {
            currentType = type;
            document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll(`[onclick="changeCategory('${type}')"]`).forEach(el => el.classList.add('active'));
            document.getElementById('searchBar').value = ""; 

            let heading = "Movies";
            if(type === 'tv') heading = "Series";
            if(type === 'drama') heading = "Dramas";
            if(type === 'anime') heading = "Anime";
            document.getElementById('sectionHeading').innerText = heading;

            renderCards(myDatabase.filter(item => item.type === type));
        }

        function searchContent() {
            let query = document.getElementById('searchBar').value.toLowerCase().trim();
            renderCards(myDatabase.filter(item => item.title.toLowerCase().includes(query) && item.type === currentType));
        }

        window.onload = () => { renderCards(myDatabase.filter(item => item.type === 'movie')); };
    </script>
</body>
</html>
