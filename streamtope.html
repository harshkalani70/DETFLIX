        /* --- GLOBAL STYLES --- */
        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #121212;
            --bg-card: #1a1a1a;
            --accent-yellow: #ffc107;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SIDEBAR (LAPTOP VIEW) --- */
        .sidebar {
            width: 80px;
            background-color: var(--bg-sidebar);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid #222;
            z-index: 1000;
        }

        .logo-box {
            background-color: #121212f2;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
            cursor: pointer;
        }

        .logo-box i {
            color: #ffe205;
            font-size: 20px;
        }

        .nav-icons {
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex-grow: 1;
        }

        .nav-btn {
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
        }

        .nav-btn i {
            color: var(--text-muted);
            font-size: 20px;
            transition: color 0.3s, transform 0.25s ease;
        }

        .nav-btn:hover i,
        .nav-btn.active i {
            color: var(--accent-yellow);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: 80px; /* Space for sidebar */
            padding: 30px 20px 30px 40px;
            width: calc(100% - 80px);
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .section-header i {
            color: var(--accent-yellow);
            font-size: 20px;
            margin-right: 10px;
        }

        .section-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: rgb(246, 205, 0);
        }

        /* --- MOVIE ROW (HORIZONTAL SCROLL) --- */
        .movie-row {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 1px;
            margin-bottom: 10px;
            /* Hide scrollbar */
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        
        .movie-row::-webkit-scrollbar {
            display: none;
        }

        /* --- MOVIE CARD --- */
        .movie-card {
            flex: 0 0 180px; /* Fixed width for cards */
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .poster-container {
            position: relative;
            width: 100%;
            height: 270px;
            border-radius: 12px;
            overflow: hidden;
            background-color: var(--bg-card);
            margin-bottom: 12px;
        }

        .poster-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        /* Rating Badge */
        .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 2;
        }

        .rating-badge i {
            color: var(--accent-yellow);
            font-size: 10px;
        }

        /* Play Button Hover Overlay */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .play-btn {
            background-color: var(--accent-yellow);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .play-btn i {
            color: black;
            font-size: 20px;
            margin-left: 4px; /* visually center play icon */
        }

        .movie-card:hover .play-overlay {
            opacity: 1;
        }
        
        .movie-card:hover .play-btn {
            transform: scale(1);
        }

        .movie-card:hover .poster-container img {
            transform: scale(1.05);
        }

        /* Text Details */
        .movie-info h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: none;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-info p {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* --- SEARCH BAR --- */
        .top-bar {
            display: none;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .top-bar.active {
            display: flex;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            width: min(100%, 360px);
            background: #171717;
            border: 1px solid #2a2a2a;
            border-radius: 999px;
            padding: 10px 14px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.22);
            animation: fadeUp 0.35s ease both;
        }

        .search-box input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            font-size: 14px;
        }

        .search-box i {
            color: var(--accent-yellow);
        }

        /* --- MODAL POPUP --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.86);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            width: min(100%, 620px);
            max-height: 90vh;
            overflow: auto;
            background: #121212;
            border: 1px solid rgba(255,193,7,0.2);
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
            transform: translateY(20px) scale(0.97);
            transition: transform 0.25s ease;
            animation: popIn 0.3s ease both;
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0) scale(1);
        }

        .modal-media {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .modal-media iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 50%;
            background: var(--accent-yellow);
            color: #000;
            font-size: 16px;
            cursor: pointer;
            z-index: 2;
        }

        .modal-body {

        }

        .modal-title {
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .modal-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }

            color: var(--accent-yellow);
            font-size: 14px;
            font-weight: 700;
            margin: 14px 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quality-list,
        .season-list,
        .episode-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quality-btn,
        .season-btn,
        .episode-btn {
            width: 100%;
            border: 1px solid rgba(255,193,7,0.2);
            background: #1b1b1b;
            color: white;
            border-radius: 12px;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quality-btn:hover,
        .season-btn:hover,
        .episode-btn:hover {
            background: rgba(255,193,7,0.12);
            border-color: var(--accent-yellow);
            transform: translateY(-1px);
        }

        .quality-badge {
            background: rgba(255,193,7,0.16);
            color: var(--accent-yellow);
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }

        .season-btn.active {
            background: var(--accent-yellow);
            color: #000;
            border-color: var(--accent-yellow);
        }

        .episode-item {
            border: 1px solid rgba(255,193,7,0.12);
            border-radius: 12px;
            overflow: hidden;
            background: #181818;
        }

        .episode-head { width: 100%; }

        .episode-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            padding: 0 10px;
            transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
        }

        .episode-item.open .episode-body {
            max-height: 220px;
            opacity: 1;
            padding: 8px 10px 10px;
        }

        .episode-item.open .episode-btn i {
            transform: rotate(90deg);
        }

        .episode-btn i {
            transition: transform 0.2s ease;
        }

        .episode-quality-btn {
            justify-content: space-between;
        }

        .movie-card,
        .section-header,
        .nav-btn,
        .quality-btn,
        .season-btn,
        .episode-btn {
            animation: fadeUp 0.35s ease both;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
        }

        /* --- MOBILE RESPONSIVE (SMARTPHONES) --- */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 20px 15px 80px 15px; /* Bottom padding for mobile nav */
            }

            /* Convert Sidebar to Bottom Navigation */
            .sidebar {
                width: 100%;
                height: 60px;
                top: auto;
                bottom: 0;
                flex-direction: row;
                justify-content: space-around;
                padding: 0;
                border-right: none;
                border-top: 1px solid #222;
                background-color: rgba(18, 18, 18, 0.95);
                backdrop-filter: blur(10px);
            }

            .logo-box {
                display: none; /* Hide top logo on mobile */
            }

            .nav-icons {
                flex-direction: row;
                width: 100%;
                justify-content: space-around;
                align-items: center;
                gap: 0;
            }

            .nav-icons i {
                font-size: 22px;
            }

            /* Adjust Movie Cards for Mobile */
            .movie-card {
                flex: 0 0 130px;
            }

            .poster-container {
                height: 195px;
            }
            
            .section-header h2 {
                font-size: 18px;
            }
        }
    </style>

        const searchInput = document.getElementById('searchInput');
        const contentSections = document.getElementById('contentSections');
        const topBar = document.getElementById('topBar');
        let activeNav = 'home';
        const modal = document.getElementById('mediaModal');
        const modalPlayer = document.getElementById('modalPlayer');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const qualitySection = document.getElementById('qualitySection');
        const seasonSection = document.getElementById('seasonSection');
        const episodeSection = document.getElementById('episodeSection');

        function renderCards(containerId, movies) {
            const container = document.getElementById(containerId);
            container.innerHTML = movies.map(movie => `
                <div class="movie-card" onclick="openModal(${JSON.stringify(movie).replace(/"/g, '&quot;')})">
                    <div class="poster-container">
                        <img src="${movie.img}" alt="${movie.title}">
                        <div class="">
                            <i class=""></i> ${movie.rating}
                        </div>
                        <div class="play-overlay">
                            <div class="">
                                <i class=""></i>
                            </div>
                        </div>
                    </div>
                    <div class="movie-info">
                        <h3>${movie.title}</h3>
                        <p>${movie.date}</p>
                    </div>
                </div>
            `).join('');
        }

        function setActiveNav(nav) {
            activeNav = nav;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-nav') === nav);
            });
            if (nav === 'search') {
                searchInput.focus();
            }
            renderContent();
        }

        function renderContent() {
            const query = searchInput.value.trim().toLowerCase();
            const filtered = contentItems.filter(item => item.title.toLowerCase().includes(query));
            topBar.classList.toggle('active', activeNav === 'search');

            if (activeNav === 'search') {
                const movies = filtered.filter(item => item.type === 'movie');
                const series = filtered.filter(item => item.type === 'series');

                contentSections.innerHTML = `
                    <div class="section-header">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <h2>${query ? 'Search Results' : 'Search All Content'}</h2>
                    </div>

                    <div class="movie-row" id="search-movies-row"></div>
                    <div class="movie-row" id="search-tv-row"></div>
                `;

                renderCards('search-movies-row', query ? movies : contentItems.filter(item => item.type === 'movie'));
                renderCards('search-tv-row', query ? series : contentItems.filter(item => item.type === 'series'));
                return;
            }

            if (activeNav === 'movies') {
                contentSections.innerHTML = `
                    <div class="section-header">
                        <i class="fa-solid fa-film"></i>
                        <h2>Movies</h2>
                    </div>
                    <div class="movie-row" id="movies-row"></div>
                `;
                renderCards('movies-row', contentItems.filter(item => item.type === 'movie'));
                return;
            }

            if (activeNav === 'tv') {
                contentSections.innerHTML = `
                    <div class="section-header">
                        <i class="fa-solid fa-tv"></i>
                        <h2>TV Series</h2>
                    </div>
                    <div class="movie-row" id="tv-row"></div>
                `;
                renderCards('tv-row', contentItems.filter(item => item.type === 'series'));
                return;
            }

            contentSections.innerHTML = `
                <div class="section-header"">
                    <i class="fa-solid fa-fire"></i>
                    <h2>new Movies</h2>
                </div>
                <div class="movie-row" id="movies"></div>

                <div class="section-header" style="margin-top: 1px;">
                    <i class="fa-solid fa-fire"></i>
                    <h2>new dramas</h2>
                </div>
                <div class="movie-row" id="tv"></div>
            `;

            renderCards('movies', contentItems.filter(item => item.section === 'movies'));
            renderCards('tv', contentItems.filter(item => item.section === 'tv'));
            renderCards('trending', contentItems.filter(item => item.section === 'trending'));
        }

        function getTrailerSrc(url) {
            if (!url) return '';
            if (url.includes('youtube.com/embed') || url.includes('youtube-nocookie.com/embed')) {
                const separator = url.includes('?') ? '&' : '?';
                return `${url}${separator}autoplay=1&mute=0&rel=0&controls=1&playsinline=1&modestbranding=1&showinfo=0&vq=hd720`;
            }
            return url;
        }

        function buildQualityButtons(item) {
            const qualities = [
                { label: '480p', url: item.url480p },
                { label: '720p', url: item.url720p },
                { label: '1080p', url: item.url1080p }
            ].filter(q => q.url);

            if (!qualities.length) return '';

            return `
                <div class="section-subtitle"><i class="fa-solid fa-layer-group"></i> Select Quality</div>
                <div class="quality-list">
                    ${qualities.map(q => `
                        <button class="quality-btn" type="button" onclick="window.open('${q.url}', '_blank')">
                            <span><i class="fa-solid fa-play"></i> Watch</span>
                            <span class="quality-badge">${q.label}</span>
                        </button>
                    `).join('')}
                </div>
            `;
        }

        let currentModalItem = null;

        function openModal(item) {
            currentModalItem = item;
            modalTitle.innerText = item.title;
            modalDesc.innerText = item.desc;
            modalPlayer.src = getTrailerSrc(item.trailerUrl || '');
            qualitySection.innerHTML = '';
            seasonSection.innerHTML = '';
            episodeSection.innerHTML = '';

            if (item.type === 'movie') {
                qualitySection.innerHTML = buildQualityButtons(item);
            } else if (item.type === 'series' && item.seasons) {
                seasonSection.innerHTML = `
                    <div class="section-subtitle"><i class="fa-solid fa-film"></i> Select Season</div>
                    <div class="season-list">
                        ${item.seasons.map((season, index) => `
                            <button class="season-btn ${index === 0 ? 'active' : ''}" type="button" onclick="loadEpisodes(${index})">${season.seasonName}</button>
                        `).join('')}
                    </div>
                `;
                episodeSection.innerHTML = '<div class="section-subtitle"><i class="fa-solid fa-list"></i> Episodes</div>';
                loadEpisodes(0);
            }

            modal.classList.add('active');
        }

        function loadEpisodes(seasonIndex) {
            if (!currentModalItem || !currentModalItem.seasons) return;
            
            const seasonButtons = document.querySelectorAll('.season-btn');
            seasonButtons.forEach((btn, idx) => {
                btn.classList.toggle('active', idx === seasonIndex);
            });

            const season = currentModalItem.seasons[seasonIndex];
            const episodes = season ? season.episodes : [];
            episodeSection.innerHTML = `
                <div class="section-subtitle"><i class="fa-solid fa-list"></i> Episodes</div>
                <div class="episode-list">
                    ${episodes.map((ep) => {
                        const qualities = [
                            { label: '480p', url: ep.url480p },
                            { label: '720p', url: ep.url720p },
                            { label: '1080p', url: ep.url1080p }
                        ].filter(q => q.url);

                        return `
                            <div class="episode-item">
                                <button class="episode-btn episode-head" type="button" onclick="toggleEpisode(this.parentElement)">
                                    <span>${ep.name}</span>
                                    <i class="fa-solid fa-chevron-right"></i>
                                </button>
                                ${qualities.length ? `
                                    <div class="episode-body">
                                        ${qualities.map(q => `
                                            <button class="quality-btn episode-quality-btn" type="button" onclick="playEpisode('${q.url}')">
                                                <span><i class="fa-solid fa-play"></i> Watch</span>
                                                <span class="quality-badge">${q.label}</span>
                                            </button>
                                        `).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function toggleEpisode(item) {
            const isOpen = item.classList.contains('open');
            document.querySelectorAll('.episode-item').forEach(el => el.classList.remove('open'));
            if (!isOpen) {
                item.classList.add('open');
            }
        }

        function playEpisode(url) {
            if (!url) return;
            if (url.includes('streamtape.com')) {
                const embedUrl = url.replace('v/', 'e/') + '?autoplay=1&noads=1';
                modalPlayer.src = embedUrl;
            } else {
                modalPlayer.src = url;
            }
        }

        function closeModal() {
            modal.classList.remove('active');
            modalPlayer.src = '';
        }

        renderContent();
    </script>
</body>
</html>
