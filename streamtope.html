        // --- RENDER FUNCTION ---
        function renderGrid(items) {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = '';
            if (items.length === 0) {
                grid.innerHTML = `<p style="color: #b3b3b3; padding: 20px 0;">No results found.</p>`;
                return;
            }
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openModal(item);
                card.innerHTML = `
                    <div class="card-img-box">
                        <img src="${item.img}" alt="${item.title}" loading="lazy">
                        <div class="card-overlay"><i class="fas fa-info-circle"></i></div>
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${item.title}</div>
                        <div class="movie-meta">
                            <span>${item.year}</span>
                            <span class="rating-badge">
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- CATEGORY CONTROLLER ---
        function changeCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(el => {
                if (el.getAttribute('data-cat') === cat) el.classList.add('active');
                else el.classList.remove('active');
            });
            const heading = document.getElementById('sectionHeading');
            if (cat === 'home') heading.innerText = 'Home Updates';
            else if (cat === 'movie') heading.innerText = 'Ultimate Movies';
            else if (cat === 'tv') heading.innerText = 'Series & K-Dramas';
            filterData();
        }

        function filterData() {
            let filtered = myDatabase;
            if (currentCategory !== 'home') filtered = myDatabase.filter(item => item.type === currentCategory);
            renderGrid(filtered);
        }

        function searchContent() {
            const query = document.getElementById('searchBar').value.toLowerCase().trim();
            let baseList = myDatabase;
            if (currentCategory !== 'home') baseList = myDatabase.filter(item => item.type === currentCategory);
            const searchResults = baseList.filter(item => item.title.toLowerCase().includes(query));
            renderGrid(searchResults);
        }

        function openModal(item) {

            document.getElementById('modalTitle').innerText = item.title;
            document.getElementById('modalDesc').innerText = item.desc;

            const trailerPlayer = document.getElementById('trailerPlayer');
            const videoBox = document.getElementById('videoBox');

            // Trailer setup
            if(item.trailerUrl) {
                videoBox.style.display = 'block';
                trailerPlayer.src = item.trailerUrl;
            } else {
                videoBox.style.display = 'none';
                trailerPlayer.src = '';

            const seasonsSection = document.getElementById('seasonsSection');

            } 
            // IF TV SERIES TYPE -> Show Seasons & Episodes
            else if (item.type === "tv" && item.seasons && item.seasons.length > 0) {
                seasonsSection.style.display = 'block';
                episodesSection.style.display = 'block';
                seasonsBox.innerHTML = '';

                item.seasons.forEach((season, index) => {
                    const btn = document.createElement('button');
                    btn.className = `season-tab-btn ${index === 0 ? 'active' : ''}`;
                    btn.innerText = season.seasonName;
                    
                    btn.onclick = () => {
                        document.querySelectorAll('.season-tab-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        loadEpisodes(season.episodes);
                    };
                    seasonsBox.appendChild(btn);
                });

                // Load initial first season
                loadEpisodes(item.seasons[0].episodes);
            }

            modal.classList.add('active');
        }

        // Helper to configure Quality buttons or hide them if blank
        function setupQualityButton(btnId, url) {
            const btn = document.getElementById(btnId);
            if(url && url.trim() !== "") {
                btn.style.display = 'flex';
                btn.onclick = () => window.open(url, '_blank');
            } else {
                btn.style.display = 'none';
            }
        }

        // Load series episodes list
        function loadEpisodes(episodes) {
            const epBox = document.getElementById('episodeBox');
            epBox.innerHTML = '';
            
            episodes.forEach(ep => {
                const btn = document.createElement('div');
                btn.className = 'episode-btn';
                btn.innerHTML = `<span>${ep.name}</span><i class="fas fa-external-link-alt"></i>`;
                btn.onclick = () => window.open(ep.url, '_blank');
                epBox.appendChild(btn);
            });
        }

        function closeModal() {
            document.getElementById('playerModal').classList.remove('active');
            document.getElementById('trailerPlayer').src = '';
        }

        window.onload = () => {
            filterData();
        };
    </script>
</body>
</html>
